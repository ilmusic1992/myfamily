<style>
:root{--paper:#fbf7f2;--paper-deep:#f3ede4;--ink:#3d4738;--ink-soft:#8c9482;--brass:#c97d5d;--brass-soft:#e0ab94;--stone:#ece4d8;--stone-line:#ddd3c2;--card:#ffffff;--serif:'Frank Ruhl Libre', Georgia, serif;--sans:'Heebo', system-ui, sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;padding-bottom:90px;-webkit-font-smoothing:antialiased;}

.hero{position:relative;height:100vh;min-height:600px;overflow:hidden;display:flex;flex-direction:column;background:#36402f;}
.hero-photo{position:relative;flex:1;overflow:hidden;}
.hero-photo .frame{position:absolute;inset:0;background:linear-gradient(180deg, rgba(61,71,56,0.05) 0%, rgba(61,71,56,0.55) 75%, rgba(61,71,56,0.92) 100%),repeating-linear-gradient(115deg, rgba(201,125,93,0.14) 0px, rgba(201,125,93,0.14) 2px, transparent 2px, transparent 64px),linear-gradient(135deg, #cdc3ae 0%, #a8a288 45%, #7d7d63 100%);}
.hero-photo .caption{position:absolute;top:24px;left:24px;font-family:var(--serif);font-style:italic;font-size:0.85rem;color:rgba(251,247,242,0.85);letter-spacing:0.5px;}
.hero-photo .frame-no{position:absolute;top:24px;right:24px;font-size:0.7rem;letter-spacing:3px;color:rgba(251,247,242,0.65);font-weight:500;}
.photo-dots{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:6px;padding-bottom:14px;z-index:4;}
.photo-dots span{width:5px;height:5px;border-radius:50%;background:rgba(61,71,56,0.25);transition:.3s;}
.photo-dots span.on{background:var(--brass);width:18px;border-radius:3px;}

.hero-content{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:0 28px 38px;color:var(--paper);text-align:center;}
.hero-content .eyebrow{font-size:0.7rem;letter-spacing:4px;text-transform:uppercase;color:var(--brass-soft);margin-bottom:14px;font-weight:600;}
.hero-content h1{font-family:var(--serif);font-weight:500;font-size:2.6rem;line-height:1.2;margin-bottom:14px;letter-spacing:0.5px;}
.hero-content p{font-size:0.88rem;color:rgba(251,247,242,0.65);margin-bottom:30px;max-width:300px;margin-inline:auto;line-height:1.7;font-weight:300;}
.google-btn{background:var(--paper);color:var(--ink);border:none;border-radius:2px;padding:15px 32px;font-size:0.88rem;font-weight:600;letter-spacing:0.5px;display:inline-flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;font-family:var(--sans);}
.google-btn:active{transform:scale(0.97);}
.google-btn svg{width:18px;height:18px;}
.google-btn:disabled{opacity:0.6;cursor:not-allowed;}
.hero-foot{margin-top:18px;font-size:0.7rem;color:rgba(251,247,242,0.4);letter-spacing:1px;}

.app{display:none;}
.app.active{display:block;}

.topbar{background:var(--card);border-bottom:1px solid var(--stone-line);padding:18px 20px 0;position:sticky;top:0;z-index:10;}
.topbar .brand{font-family:var(--serif);font-size:1.1rem;text-align:center;margin-bottom:14px;letter-spacing:0.5px;}
.topbar .brand .dot{color:var(--brass);}
.topbar .user-email{font-size:0.75rem;color:var(--ink-soft);text-align:center;margin-bottom:10px;}

nav.tabs{display:flex;gap:0;}
nav.tabs button{flex:1;padding:12px 4px;border:none;background:none;font-size:0.78rem;font-weight:600;letter-spacing:0.5px;color:var(--ink-soft);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:var(--sans);}
nav.tabs button.active{color:var(--ink);border-bottom-color:var(--brass);}

main{padding:24px 18px;}
.view{display:none;}
.view.active{display:block;}

.page-title{font-family:var(--serif);font-size:1.7rem;font-weight:500;color:var(--ink);}
.page-sub{font-size:0.8rem;color:var(--ink-soft);margin-bottom:26px;padding-bottom:18px;border-bottom:1px solid var(--stone-line);}

.celebrant-card{background:var(--card);border:1px solid var(--stone-line);margin-bottom:14px;display:flex;align-items:stretch;min-height:108px;position:relative;cursor:pointer;transition:all .2s;}
.celebrant-card:hover{border-color:var(--brass);box-shadow:0 4px 12px rgba(201,125,93,0.1);}
.celebrant-card .photo{width:108px;flex-shrink:0;position:relative;overflow:hidden;border-right:1px solid var(--stone-line);}
.celebrant-card .photo .tone{position:absolute;inset:0;background:repeating-linear-gradient(125deg, rgba(61,71,56,0.05) 0px, rgba(61,71,56,0.05) 1px, transparent 1px, transparent 22px),linear-gradient(150deg, var(--stone-line) 0%, var(--stone) 100%);}
.celebrant-card .photo .initial{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:2.4rem;font-weight:500;color:var(--ink-soft);}
.celebrant-card .content{padding:16px 18px;flex:1;display:flex;flex-direction:column;justify-content:center;}
.celebrant-card .name{font-family:var(--serif);font-size:1.15rem;font-weight:500;margin-bottom:4px;}
.celebrant-card .date-info{font-size:0.74rem;color:var(--ink-soft);margin-bottom:10px;letter-spacing:0.3px;}
.celebrant-card .countdown{display:inline-flex;align-items:center;gap:8px;font-size:0.72rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);}
.celebrant-card .countdown .num{font-family:var(--serif);font-size:1.3rem;font-weight:500;color:var(--ink);letter-spacing:0;text-transform:none;}
.celebrant-card.is-today{border-color:var(--brass);}
.celebrant-card.is-today::before{content:'';position:absolute;top:0;right:0;bottom:0;width:3px;background:var(--brass);}
.celebrant-card.is-today .countdown{color:var(--brass);}
.celebrant-card.is-today .countdown .num{color:var(--brass);}
.today-tag{position:absolute;top:-1px;left:-1px;background:var(--brass);color:var(--paper);font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;font-weight:600;}

.yahrzeit-card{background:var(--paper-deep);border-left:3px solid var(--brass);padding:12px 14px;margin-bottom:12px;border-radius:2px;}
.yahrzeit-card .name{font-weight:600;font-size:0.95rem;margin-bottom:4px;}
.yahrzeit-card .date{font-size:0.75rem;color:var(--ink-soft);}

.family-tree-svg{width:100%;max-width:600px;margin:20px auto;border:1px solid var(--stone-line);background:var(--card);padding:20px;border-radius:8px;}

.person-node{cursor:pointer;transition:all .2s;}
.person-node:hover rect{stroke:var(--brass);stroke-width:2;}
.person-node text{font-family:var(--sans);font-size:12px;fill:var(--ink);}

.person-card{background:var(--card);border:1px solid var(--stone-line);margin-bottom:12px;padding:14px;border-radius:4px;}
.person-card .name{font-family:var(--serif);font-size:1.1rem;font-weight:500;margin-bottom:8px;}
.person-card .info{font-size:0.85rem;color:var(--ink-soft);margin-bottom:12px;}
.person-card .actions{display:flex;gap:8px;}
.person-card button{flex:1;padding:8px 12px;border:none;background:var(--stone);color:var(--ink);border-radius:2px;cursor:pointer;font-size:0.8rem;font-weight:600;}
.person-card button:active{background:var(--brass);}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;}
.modal.active{display:flex;}
.modal-content{background:var(--card);border-radius:8px;padding:24px;max-width:90vw;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--ink-soft);}

.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:0.85rem;font-weight:600;margin-bottom:4px;color:var(--ink);}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px;border:1px solid var(--stone-line);border-radius:4px;font-family:var(--sans);font-size:0.9rem;}
.form-group textarea{resize:vertical;min-height:80px;}

.btn-primary{background:var(--brass);color:var(--paper);border:none;padding:12px 20px;border-radius:2px;cursor:pointer;font-weight:600;font-size:0.9rem;}
.btn-primary:active{transform:scale(0.97);}

.logout-btn{position:absolute;top:18px;left:18px;background:var(--stone-line);color:var(--ink);border:none;border-radius:2px;padding:8px 14px;font-size:0.75rem;cursor:pointer;font-family:var(--sans);}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--stone-line);display:flex;padding:6px 0 10px;z-index:15;}
.bottom-nav button{flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:0.68rem;color:var(--ink-soft);cursor:pointer;padding:4px 0;}
.bottom-nav button.active{color:var(--ink);font-weight:700;}
.bottom-nav .icon{font-size:1.25rem;}

.loading{text-align:center;padding:40px;color:var(--ink-soft);}
.error{background:#ffe0e0;color:#d32f2f;padding:16px;border-radius:8px;margin-bottom:16px;font-size:0.85rem;}
.success{background:#e8f5e9;color:#2e7d32;padding:16px;border-radius:8px;margin-bottom:16px;font-size:0.85rem;}

.settings-item{padding:12px;border-bottom:1px solid var(--stone-line);display:flex;align-items:center;justify-content:space-between;}
.settings-item label{font-weight:600;font-size:0.9rem;}
.toggle{width:50px;height:28px;background:var(--stone-line);border-radius:14px;border:none;cursor:pointer;position:relative;transition:.3s;}
.toggle.on{background:var(--brass);}
.toggle::after{content:'';position:absolute;width:24px;height:24px;background:var(--card);border-radius:50%;top:2px;right:2px;transition:.3s;}

</head>

function getAge(dob) {
  if (!dob) return null;
  const today = new Date();
  const bd = new Date(dob);
  let age = today.getFullYear() - bd.getFullYear();
  const m = today.getMonth() - bd.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < bd.getDate())) age--;
  return age;
}

function daysUntilBirthday(dob) {
  if (!dob) return null;
  const today = new Date();
  const bd = new Date(dob);
  const thisYear = new Date(today.getFullYear(), bd.getMonth(), bd.getDate());
  if (thisYear < today) {
    thisYear.setFullYear(today.getFullYear() + 1);
  }
  return Math.ceil((thisYear - today) / (1000 * 60 * 60 * 24));
}

function renderCelebrants() {
  const today = new Date();
  const month = today.getMonth();
  const celebrants = familyData.filter(p => {
    if (!p.dob_gregorian || p.status !== 'alive') return false;
    const bd = new Date(p.dob_gregorian);
    return bd.getMonth() === month;
  }).sort((a, b) => new Date(a.dob_gregorian).getDate() - new Date(b.dob_gregorian).getDate());

  const container = document.getElementById('celebrantsContainer');
  const monthNames = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  document.getElementById('monthSub').innerHTML = `${monthNames[month]} 2026 · ${celebrants.length} חוגגים`;

  if (celebrants.length === 0) {
    container.innerHTML = '<p style="padding:40px;text-align:center;color:var(--ink-soft);">אין חוגגים החודש</p>';
  } else {
    container.innerHTML = celebrants.map(p => {
      const age = getAge(p.dob_gregorian);
      const isToday = new Date(p.dob_gregorian).getDate() === today.getDate();
      const initial = p.firstName.charAt(0);
      const daysLeft = daysUntilBirthday(p.dob_gregorian);
      return `
        <div class="celebrant-card ${isToday ? 'is-today' : ''}" onclick="openEditModal('${p.id}')">
          ${isToday ? '<span class="today-tag">היום</span>' : ''}
          <div class="photo"><div class="tone"></div><span class="initial">${initial}</span></div>
          <div class="content">
            <div class="name">${p.fullName}</div>
            <div class="date-info">${new Date(p.dob_gregorian).toLocaleDateString('he-IL')}</div>
            <div class="countdown"><span class="num">${age}</span> שנים ${daysLeft === 0 ? '(היום!)' : daysLeft === 1 ? '(מחר!)' : `(עוד ${daysLeft} ימים)`}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  renderYahrzeitMonth();
}

function renderYahrzeitMonth() {
  const today = new Date();
  const month = today.getMonth();
  const yahrzeits = familyData.filter(p => {
    if (p.status !== 'deceased' || !p.yahrzeit_hebrew) return false;
    const months = ['תשרי','חשון','כסלו','טבת','שבט','אדר','ניסן','אייר','סיוון','תמוז','אב','אלול'];
    return months.includes(p.yahrzeit_hebrew.split(' ').pop());
  });

  const container = document.getElementById('yahrzeitContainer');
  if (yahrzeits.length > 0) {
    container.innerHTML = '<div style="margin-top:30px;"><h3 style="font-family:var(--serif);margin-bottom:12px;">יארצייטים</h3>' + 
      yahrzeits.map(p => `
        <div class="yahrzeit-card">
          <div class="name">${p.fullName}</div>
          <div class="date">יארצייט: ${p.yahrzeit_hebrew}</div>
        </div>
      `).join('') + '</div>';
  }
}

function renderFamilyTree() {
  const container = document.getElementById('treeContainer');
  const gen1 = familyData.filter(p => p.parents.length === 0 && p.children.length > 0);
  const gen2 = familyData.filter(p => p.parents.some(id => gen1.find(g => g.id === id)));
  const gen3 = familyData.filter(p => p.parents.some(id => gen2.find(g => g.id === id)));

  let html = '<div style="padding:20px;">';
  html += '<h3 style="font-family:var(--serif);margin-bottom:10px;">דור 1 - ההורים</h3>';
  html += gen1.map(p => `<div style="padding:8px 0;"><strong>${p.fullName}</strong></div>`).join('');
  
  html += '<h3 style="font-family:var(--serif);margin-top:20px;margin-bottom:10px;">דור 2 - הילדים</h3>';
  html += gen2.map(p => `<div style="padding:8px 0;"><strong>${p.fullName}</strong></div>`).join('');
  
  html += '<h3 style="font-family:var(--serif);margin-top:20px;margin-bottom:10px;">דור 3 - הנכדים</h3>';
  html += gen3.map(p => `<div style="padding:8px 0;cursor:pointer;" onclick="openEditModal('${p.id}')">${p.fullName}</div>`).join('');
  
  html += '</div>';
  container.innerHTML = html;
}

function renderList() {
  const container = document.getElementById('listContainer');
  document.getElementById('listSub').innerHTML = `${familyData.filter(p => p.status === 'alive').length} בני משפחה`;

  container.innerHTML = familyData.filter(p => p.status === 'alive').map(p => {
    const age = getAge(p.dob_gregorian);
    return `
      <div class="person-card" onclick="openEditModal('${p.id}')">
        <div class="name">${p.fullName}</div>
        <div class="info">
          ${p.dob_gregorian ? new Date(p.dob_gregorian).toLocaleDateString('he-IL') + (age ? ` · בן/בת ${age}` : '') : 'תאריך לא ידוע'}
          ${p.spouse ? `<br/>בן/בת זוג: ${familyData.find(x => x.id === p.spouse)?.fullName || '?'}` : ''}
        </div>
        <div class="actions">
          <button>עדכן</button>
        </div>
      </div>
    `;
  }).join('');
}

function renderSettings() {
  const container = document.getElementById('settingsContainer');
  container.innerHTML = `
    <div class="settings-item">
      <label>התראות ליום ההולדת</label>
      <button class="toggle ${userPrefs.birthdayNotif !== false ? 'on' : ''}" onclick="toggleSetting('birthdayNotif')"></button>
    </div>
    <div class="settings-item">
      <label>התראות ליארצייט</label>
      <button class="toggle ${userPrefs.yahrzeitNotif !== false ? 'on' : ''}" onclick="toggleSetting('yahrzeitNotif')"></button>
    </div>
    <div class="settings-item">
      <label>הודעות דוא״ל</label>
      <button class="toggle ${userPrefs.emailNotif !== false ? 'on' : ''}" onclick="toggleSetting('emailNotif')"></button>
    </div>
    <div style="padding:20px;background:var(--paper);margin-top:20px;border-radius:4px;font-size:0.9rem;line-height:1.6;">
      <strong>על האפליקציה:</strong><br/>
      My Family · משפחת לשנסקי<br/>
      גרסה 1.0 (Complete)<br/>
      2026
    </div>
  `;
}

function toggleSetting(key) {
  userPrefs[key] = !userPrefs[key];
  localStorage.setItem('userPrefs', JSON.stringify(userPrefs));
  renderSettings();
}

function openEditModal(personId) {
  const person = familyData.find(p => p.id === personId);
  if (!person || !person.linkedUser) return; // Only allow editing own profile

  const form = `
    <div class="form-group">
      <label>שם</label>
      <input type="text" value="${person.fullName}" id="editName">
    </div>
    <div class="form-group">
      <label>תאריך לידה (YYYY-MM-DD)</label>
      <input type="text" value="${person.dob_gregorian || ''}" id="editDob">
    </div>
    <div class="form-group">
      <label>הערות</label>
      <textarea id="editNotes">${person.notes || ''}</textarea>
    </div>
    <div style="display:flex;gap:12px;">
      <button class="btn-primary" onclick="saveEdit('${personId}')">שמור</button>
      <button style="flex:1;padding:12px;background:var(--stone);border:none;border-radius:2px;cursor:pointer;" onclick="closeEditModal()">ביטול</button>
    </div>
  `;
  
  document.getElementById('editFormContainer').innerHTML = form;
  document.getElementById('editModal').classList.add('active');
}

function saveEdit(personId) {
  const person = familyData.find(p => p.id === personId);
  person.fullName = document.getElementById('editName').value;
  person.dob_gregorian = document.getElementById('editDob').value;
  person.notes = document.getElementById('editNotes').value;
  
  localStorage.setItem('familyData', JSON.stringify(familyData));
  closeEditModal();
  renderList();
  renderCelebrants();
  alert('עדכון שמור בהצלחה!');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('active');
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('heroScreen').style.display = 'none';
    document.getElementById('mainApp').classList.add('active');
    document.getElementById('userEmail').textContent = user.email;
    
    familyData = JSON.parse(localStorage.getItem('familyData')) || mockFamilyData;
    userPrefs = JSON.parse(localStorage.getItem('userPrefs')) || {};
    
    renderCelebrants();
    renderFamilyTree();
    renderList();
    renderSettings();
  } else {
    currentUser = null;
    document.getElementById('heroScreen').style.display = 'flex';
    document.getElementById('mainApp').classList.remove('active');
  }
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  try {
    document.getElementById('loginBtn').disabled = true;
    await signInWithPopup(auth, googleProvider);
  } catch (error) {
    alert('שגיאה בהתחברות: ' + error.message);
    document.getElementById('loginBtn').disabled = false;
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  try {
    await signOut(auth);
  } catch (error) {
    alert('שגיאה בהתנתקות: ' + error.message);
  }
});

document.getElementById('closeModal').addEventListener('click', closeEditModal);

document.querySelectorAll('.tab-btn, .nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const view = btn.dataset.view;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(view).classList.add('active');
    document.querySelectorAll('.tab-btn, .nav-btn').forEach(b => 
      b.classList.toggle('active', b.dataset.view === view)
    );
  });
});
</script>
